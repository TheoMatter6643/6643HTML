<!DOCTYPE html>
<html lang="en-US">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Walnuts and Bolts</title>
<link rel="icon" type="image/x-icon" href="Photos/TeamLogo.svg">
</head>
<body>
<header>
  <img src="Photos/6643Logo.png" alt="Team Logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="sponsors.html">Sponsors</a>
    <a href="fll.html">FLL</a>
    <a href="photogallery.html">Photos</a>
  </nav>
</header>
  <div class="column">
    <img title="We won an award!" src="Photos/HomePhoto.jpg" alt="Team with award" width= "560px"; height= "350px"; style="padding-top: 10px; border-radius: 20px;">
  <div class="column-text">
    <h1 style="font-weight: normal; line-height: 1; padding-left: 64px; margin-left: -10px; margin-top: -190px; font-size: 60px; ">WELCOME TO TEAM 6643</h1>
    <h2 style="font-weight: normal; padding-left: 64px; flex-grow: 0; margin-top: -10px; flex-shrink: 0">Racine, WI</h2>
  </div>
  </div>
<footer>
 <div class="gear-wrapper">
 <div class="img-stack">
  <img src="Photos/6643Gear2.png" class="spin" alt="Gear">
  <img src="Photos/6643Logo2.png" class="base" alt="Team Logo">
 </div>
 </div>
  <div class="footer-text">
  <h3 style="margin-top: -120px; margin-right: 890px;">Walnuts and Bolts</h3>
  <h4 style="margin-top: -30px; margin-left: 0px; margin-bottom: 25px;">Team 6643</h4>
    
  <div style="color: #6e6e6e; margin: 0px; border: 2px solid #D8D0F2; background: #D8D0F2; width: fit-content; height: fit-content; border-radius: 10px; padding: 5px;">
  <p style="margin: 0px">2340 Mohr Avenue</p>
  <p style="margin: 0px">Racine, WI 53404</p>
  <p style="margin: 0px">United States</p>
</div>
  </div>
</footer>
<script>
const logo = document.querySelector('.img-stack');

logo.addEventListener('mouseenter', () => {
  document.body.classList.add('logo-hover');
});

logo.addEventListener('mouseleave', () => {
  document.body.classList.remove('logo-hover');
});

const base = document.querySelector(".img-stack .base");

const crankFrames = [
  "Photos/CrankFrames/crank_1.png",
  "Photos/CrankFrames/crank_2.png",
  "Photos/CrankFrames/crank_3.png",
  "Photos/CrankFrames/crank_4.png",
  "Photos/CrankFrames/crank_5.png",
  "Photos/CrankFrames/crank_6.png",
  "Photos/CrankFrames/crank_7.png",
  "Photos/CrankFrames/crank_8.png",
  "Photos/CrankFrames/crank_9.png"
];

let frameIndex = 0;
let cursorInterval = null;

base.addEventListener("mouseenter", () => {
  const frameTime = 2000 / crankFrames.length; // 2 seconds total

  cursorInterval = setInterval(() => {
    document.body.style.cursor = `url(${crankFrames[frameIndex]}) 24 24, auto`;
    frameIndex = (frameIndex + 1) % crankFrames.length;
  }, frameTime);
});

base.addEventListener("mouseleave", () => {
  clearInterval(cursorInterval);
  cursorInterval = null;
  frameIndex = 0;
  document.body.style.cursor = "auto";
});
</script>
</body>
</html>
