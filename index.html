<!DOCTYPE html>
<html lang="en-US">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">
<title>Walnuts and Bolts</title>
<link rel="icon" type="image/x-icon" href="Photos/TeamLogo.svg">
</head>
<body>
<div id="header"></div>
  <section class="hero">
  <div class="hero-content">
    <h1>Walnuts and Bolts </h1>
    <h1>Team 6643</h1>
    <h2>Racine, WI</h2>
  </div>
</section>
<footer>
 <div class="gear-wrapper">
 <div class="img-stack">
  <img src="Photos/6643Gear2.png" class="spin" alt="Gear">
  <img src="Photos/6643Logo2.png" class="base" alt="Team Logo">
 </div>
 </div>
  <div class="footer-text">
  <h3 style="margin-top: -120px;">Walnuts and Bolts</h3>
  <h4 style="margin-top: -30px; margin-left: 0px; margin-bottom: 25px;">Team 6643</h4>
    
<div class="address">
  <p style="margin: 0px">2340 Mohr Avenue</p>
  <p style="margin: 0px">Racine, WI 53404</p>
  <p style="margin: 0px">United States</p>
</div>
  </div>
</footer>
<script>
const logo = document.querySelector('.img-stack');

logo.addEventListener('mouseenter', () => {
  document.body.classList.add('logo-hover');
});

logo.addEventListener('mouseleave', () => {
  document.body.classList.remove('logo-hover');
});


const base = document.querySelector(".img-stack");

const totalFrames = 9;

/* Build the list of frame paths automatically */
const crankFrames = [];
for (let i = 1; i <= totalFrames; i++) {
  crankFrames.push(`Photos/crank/${i}.png`);
}

let frameIndex = 0;
let cursorInterval = null;

base.addEventListener("mouseenter", () => {
  const frameTime = 1000 / crankFrames.length; // 1 second total

  cursorInterval = setInterval(() => {
    document.body.style.cursor = `url(${crankFrames[frameIndex]}) 24 24, auto`;
    frameIndex = (frameIndex + 1) % crankFrames.length;
  }, frameTime);
});

base.addEventListener("mouseleave", () => {
  clearInterval(cursorInterval);
  cursorInterval = null;
  frameIndex = 0;
  document.body.style.cursor = "auto";
});
  
  const header = document.querySelector("header");

  window.addEventListener("scroll", () => {
    if (window.scrollY > 30) {
      header.classList.add("scrolled");
    } else {
      header.classList.remove("scrolled");
    }
  });

  fetch("header.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("header").innerHTML = data;
    });
</script>
</body>
</html>
